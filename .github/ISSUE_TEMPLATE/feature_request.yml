name: 💡 Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve House Edge Casino 🎰  
        We love hearing new ideas!

  - type: input
    id: summary
    attributes:
      label: What would you like to see?
      placeholder: Add a statistics dashboard for blackjack sessions
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Why would this feature be useful?
      placeholder: I want to track my performance over time
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your ideal solution
      placeholder: A dashboard showing win rate, streaks, and bankroll trends
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other ways this could work?

  - type: dropdown
    id: impact
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would improve my experience
        - Very important
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples, or anything else helpful
